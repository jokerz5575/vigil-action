name: CI — Test the OSSentinel Action

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Test 1: Basic scan with no policy
  test-basic:
    name: Test basic scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSSentinel (no policy)
        uses: ./ # Use the local action
        with:
          format: terminal

  # Test 2: Scan with permissive policy (should pass)
  test-with-policy:
    name: Test with policy file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSSentinel with policy
        uses: ./
        with:
          policy-file: tests/fixtures/permissive-policy.yaml
          format: html
          output-file: test-report.html
          upload-report: true

  # Test 3: Confirm outputs work
  test-outputs:
    name: Test action outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSSentinel
        id: ossentinel
        uses: ./
        continue-on-error: true
      - name: Print outputs
        run: |
          echo "has-errors: ${{ steps.ossentinel.outputs.has-errors }}"
          echo "has-warnings: ${{ steps.ossentinel.outputs.has-warnings }}"
          echo "total-dependencies: ${{ steps.ossentinel.outputs.total-dependencies }}"

  # Test 4: Scan with GitHub token (secret-based, only runs on non-fork pushes)
  test-with-github-token:
    name: Test with GitHub token
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Run OSSentinel with GitHub token
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: terminal

  # Create GitHub Release on version tags
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-basic, test-with-policy, test-outputs, test-with-github-token]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
